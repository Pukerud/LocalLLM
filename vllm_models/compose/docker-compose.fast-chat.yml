# ===========================================================================
# FAST-CHAT — 20K context, fp8 KV, MTP n=5, P67/P82/PN8
# Based on Alexander Ollman's RTX 3090 recipe, adapted for RTX 4090.
# Target: ~100 tok/s single-stream on short conversations.
# ===========================================================================
services:
  vllm-hostllm:
    image: vllm/vllm-openai:nightly-07351e0883470724dd5a7e9730ed10e01fc99d08
    container_name: vllm-hostllm
    restart: "no"
    ports:
      - "8080:8000"
    volumes:
      - ../:/models
      - ../genesis/vllm/_genesis:/usr/local/lib/python3.12/dist-packages/vllm/_genesis:ro
      - ../patch_tolist_cudagraph.py:/patches/patch_tolist_cudagraph.py:ro
    environment:
      - HUGGING_FACE_HUB_TOKEN=
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
      - NCCL_CUMEM_ENABLE=0
      - NCCL_P2P_DISABLE=1
      - VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS=1
      - VLLM_NO_USAGE_STATS=1
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True,max_split_size_mb:512
      - VLLM_FLOAT32_MATMUL_PRECISION=high
      - VLLM_USE_FLASHINFER_SAMPLER=1
      - OMP_NUM_THREADS=1
      - CUDA_DEVICE_MAX_CONNECTIONS=8
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
      - VLLM_MARLIN_USE_ATOMIC_ADD=1
      - GENESIS_ENABLE_P67_TQ_MULTI_QUERY_KERNEL=1
      - GENESIS_ENABLE_P82=1
      - GENESIS_ENABLE_PN8_MTP_DRAFT_ONLINE_QUANT=1
      - GENESIS_ENABLE_P64_QWEN3CODER_MTP_STREAMING=1
    shm_size: "16gb"
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    entrypoint:
      - /bin/bash
      - -c
      - |
        set -e
        pip install xxhash pandas scipy -q
        python3 -m vllm._genesis.patches.apply_all
        python3 /patches/patch_tolist_cudagraph.py
        exec vllm serve "$@"
      - --
    command:
      - --model
      - /models/qwen3.6-27b-autoround-int4
      - --served-model-name
      - qwen3.6-27b-autoround
      - --quantization
      - auto_round
      - --dtype
      - float16
      - --tensor-parallel-size
      - "1"
      - --max-model-len
      - "20000"
      - --gpu-memory-utilization
      - "0.97"
      - --max-num-seqs
      - "1"
      - --max-num-batched-tokens
      - "2048"
      - --kv-cache-dtype
      - fp8_e5m2
      - --language-model-only
      - --trust-remote-code
      - --reasoning-parser
      - qwen3
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_coder
      - --enable-prefix-caching
      - --enable-chunked-prefill
      - --speculative-config
      - '{"method":"mtp","num_speculative_tokens":5}'
      - --host
      - 0.0.0.0
      - --port
      - "8000"
